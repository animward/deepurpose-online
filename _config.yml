# GitHub Pages Configuration

# Build settings
markdown: kramdown

# Enable Jekyll processing
lsi: false
safe: true
incremental: false
highlighter: rouge
gist:
  noscript: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  lib_hygiene: false
  parse_block_html: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Collections
collections:
  pages:
    output: true
    permalink: /:path/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude files
exclude:
  - CHANGELOG.md
  - LICENSE
  - README.md
  - node_modules
  - Gemfile
  - Gemfile.lock

# Include files
include:
  - _canary.png
  - .htaccess

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Site settings
title: "Deep Purpose"
email: info@deepurpose.online
description: "The deep growing. Nitaawigiwin. The why beneath the why."
baseurl: ""
url: "https://deepurpose.online"
twitter_username: ""
github_username: ""

# VALAROMA Contact Topology
topology:
  protocol: VALAROMA1
  layer: 7
  ring: research
  function: deep-purpose
  thread: saabe-research
  center: animward.com
  teaching: saabegiigidokaanak

# Timezone
timezone: UTC

# Output
permalink: /:year/:month/:day/:title/
future: false